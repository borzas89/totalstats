<div class="container padding-top">
  <h3 class="page-title">ACB Predictions</h3>

  <!-- Date selector -->
  <div style="margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 6px;">
    <button
      *ngFor="let date of availableDates"
      class="btn btn-outline-primary btn-sm"
      (click)="quickSelectDate(date)"
      [class.active]="selectedDay === date">
      {{ formatDateLabel(date) }}
    </button>
  </div>
  <p style="color: #666; margin-bottom: 0;">
    <strong>Selected:</strong> {{ selectedDay }}
  </p>
</div>

<!-- No games -->
<div class="container" *ngIf="items.length === 0" style="margin-top: 20px;">
  <p class="text-muted">No predictions available for {{ selectedDay }}.</p>
</div>

<!-- Prediction cards -->
<div class="container-fluid" style="margin: 20px 0;" *ngIf="items.length > 0">
  <div class="row" [class.justify-content-center]="items.length === 1">
    <div
      class="col-12 col-md-6 col-lg-4"
      [class.col-lg-6]="items.length === 1"
      style="margin-bottom: 20px;"
      *ngFor="let p of items">
      <div class="card h-100">
        <div class="card-body">

          <!-- Team logos -->
          <div class="d-flex justify-content-between align-items-center mb-2">
            <img [src]="'assets/acb/' + p.awayTeamAlias + '.png'"
                 width="50" height="50" [alt]="p.awayTeamAlias"
                 class="team-logo"
                 (error)="$any($event.target).style.display='none'">
            <img [src]="'assets/acb/' + p.homeTeamAlias + '.png'"
                 width="50" height="50" [alt]="p.homeTeamAlias"
                 class="team-logo"
                 (error)="$any($event.target).style.display='none'">
          </div>

          <!-- Teams -->
          <h6 class="text-center mb-3">{{ p.awayTeamName }} <span class="text-muted">@</span> {{ p.homeTeamName }}</h6>

          <!-- Scores -->
          <div class="table-responsive mb-2">
            <table class="table table-sm table-bordered text-center mb-0">
              <thead class="table-light">
                <tr>
                  <th>Away</th>
                  <th>Spread</th>
                  <th>Home</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><strong>{{ p.predictedAwayScore }}</strong></td>
                  <td><strong>{{ p.spread }}</strong></td>
                  <td><strong>{{ p.predictedHomeScore }}</strong></td>
                  <td><strong>{{ p.predictedTotal }}</strong></td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
